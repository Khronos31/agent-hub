<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <!-- Background Grid Pattern -->
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1"/>
        </pattern>

        <!-- Drop Shadow Filter -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
        </filter>

        <!-- Glow Effect Filter -->
        <filter id="glow-hub" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Arrow Markers -->
        <marker id="arrow-end" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 Z" fill="#64748b"/>
        </marker>
        <marker id="arrow-start" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M7,0 L7,6 L0,3 Z" fill="#64748b"/>
        </marker>

        <!-- Specific Arrow Colors (Red for POST, Purple for GET/etc) -->
        <marker id="arrow-end-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 Z" fill="#ef4444"/>
        </marker>
        <marker id="arrow-end-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 Z" fill="#a855f7"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#0b0f19" />
    <rect width="100%" height="100%" fill="url(#grid)" />

    <!-- Title Header -->
    <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" letter-spacing="1">
        agent-hub システム構成図
    </text>

    <!-- ==========================================
         CONNECTIONS & DATA FLOWS (Background layer)
         ========================================== -->

    <!-- 1. User <-> Agent Hub: Web UI -->
    <path d="M 185 230 L 285 230" fill="none" stroke="#009ac7" stroke-width="2" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <text x="235" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#009ac7">Web UI</text>

    <!-- 2. あかね -> Agent Hub: POST /api/messages -->
    <path d="M 615 215 L 515 215" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-end-red)"/>
    <text x="565" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ef4444">POST /api/messages</text>

    <!-- 3. あかね <- Agent Hub: GET /api/messages -->
    <path d="M 515 245 L 615 245" fill="none" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-end-purple)"/>
    <text x="565" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#a855f7">GET /api/messages</text>

    <!-- 4. Agent Hub -> JSONL: append -->
    <path d="M 400 295 L 400 385" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow-end)"/>
    <text x="412" y="345" text-anchor="start" font-family="sans-serif" font-size="11" fill="#94a3b8">agent_chat.jsonl に追記</text>

    <!-- 5. Bundled Agents <-> Agent Hub: Polling -->
    <!-- Claude Code <-> Agent Hub -->
    <path d="M 200 115 L 315 178" fill="none" stroke="#64748b" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <text x="235" y="152" text-anchor="end" font-family="sans-serif" font-size="10" fill="#cbd5e1" transform="rotate(27.5, 235, 152)">定期ポーリング</text>

    <!-- Codex <-> Agent Hub -->
    <path d="M 400 95 L 400 165" fill="none" stroke="#64748b" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <text x="408" y="135" text-anchor="start" font-family="sans-serif" font-size="10" fill="#cbd5e1">定期ポーリング（確率的）</text>

    <!-- Antigravity <-> Agent Hub -->
    <path d="M 600 115 L 485 178" fill="none" stroke="#64748b" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <text x="565" y="152" text-anchor="start" font-family="sans-serif" font-size="10" fill="#cbd5e1" transform="rotate(-27.5, 565, 152)">定期ポーリング</text>

    <!-- ==========================================
         NODES & CARDS (Foreground layer)
         ========================================== -->

    <!-- CENTER NODE: Agent Hub -->
    <g filter="url(#shadow)">
        <rect x="290" y="170" width="220" height="120" rx="15" fill="#111827" stroke="#009ac7" stroke-width="2.5" />
        <!-- Inner glow decoration -->
        <rect x="294" y="174" width="212" height="112" rx="11" fill="none" stroke="rgba(0, 154, 199, 0.15)" stroke-width="1" />
        
        <text x="400" y="202" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#ffffff">
            🤖 Agent Hub
        </text>
        <line x1="310" y1="214" x2="490" y2="214" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
        <text x="320" y="235" text-anchor="start" font-family="sans-serif" font-size="11" fill="#9ca3af">
            • HAOS アドオンとして動作
        </text>
        <text x="320" y="254" text-anchor="start" font-family="sans-serif" font-size="11" fill="#9ca3af">
            • HTTP API / Web UI 提供
        </text>
        <text x="320" y="273" text-anchor="start" font-family="sans-serif" font-size="11" fill="#9ca3af">
            • ポーリングエンジン内蔵
        </text>
    </g>

    <!-- BUNDLED AGENTS -->
    <!-- Claude Code -->
    <g filter="url(#shadow)">
        <rect x="100" y="50" width="160" height="60" rx="10" fill="#131520" stroke="#CC785C" stroke-width="2" />
        <text x="180" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
            Claude Code
        </text>
        <text x="180" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#CC785C" font-weight="600">
            同梱エージェント
        </text>
    </g>

    <!-- Codex -->
    <g filter="url(#shadow)">
        <rect x="320" y="30" width="160" height="60" rx="10" fill="#131520" stroke="#10A37F" stroke-width="2" />
        <text x="400" y="65" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
            Codex
        </text>
        <text x="400" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#10A37F" font-weight="600">
            同梱エージェント
        </text>
    </g>

    <!-- Antigravity -->
    <g filter="url(#shadow)">
        <rect x="540" y="50" width="160" height="60" rx="10" fill="#131520" stroke="#8E76D8" stroke-width="2" />
        <text x="620" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
            Antigravity
        </text>
        <text x="620" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8E76D8" font-weight="600">
            同梱エージェント
        </text>
    </g>

    <!-- EXTERNAL AGENT: あかね -->
    <g filter="url(#shadow)">
        <rect x="620" y="195" width="160" height="70" rx="10" fill="#131520" stroke="#9C27B0" stroke-width="2" />
        <text x="700" y="228" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
            🌸 あかね
        </text>
        <text x="700" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af">
            (Embodied HA)
        </text>
    </g>

    <!-- HUMAN: ユーザー -->
    <g filter="url(#shadow)">
        <rect x="20" y="195" width="160" height="70" rx="10" fill="#131520" stroke="#009ac7" stroke-width="2" />
        <text x="100" y="228" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
            👤 ユーザー
        </text>
        <text x="100" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af">
            (人間)
        </text>
    </g>

    <!-- STORAGE: JSONL -->
    <g filter="url(#shadow)">
        <!-- Database Cylinder visual -->
        <rect x="270" y="390" width="260" height="60" rx="8" fill="#151b2e" stroke="#94a3b8" stroke-width="1.5" />
        <text x="400" y="418" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
            📄 agent_chat.jsonl
        </text>
        <text x="400" y="438" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">
            エージェント会話履歴の永続化
        </text>
    </g>
</svg>
